<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UML Diagram Generated!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.25), 
                        0 0 0 1px rgba(255,255,255,0.5) inset;
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px;
            animation: fadeInUp 0.8s ease;
        }
        
        h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 800;
            letter-spacing: -1px;
        }
        
        .success-icon {
            font-size: 5rem;
            text-align: center;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
        }
        
        .meta {
            text-align: center;
            color: #666;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 2px solid #e5e7eb;
            font-size: 1.05rem;
        }
        
        .diagram-section {
            margin: 35px 0;
        }
        
        .diagram-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .diagram-container {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid rgba(102, 126, 234, 0.1);
        }
        
        .diagram-container img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }
        
        .diagram-container img:hover {
            transform: scale(1.02);
        }
        
        .code-section {
            margin: 35px 0;
        }
        
        .code-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        pre {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            color: #f8f8f2;
            padding: 25px;
            border-radius: 15px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #404040;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 35px;
            flex-wrap: wrap;
        }
        
        .btn {
            flex: 1;
            min-width: 200px;
            padding: 18px 30px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.4);
            background-position: 100% 0;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            color: #333;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, #d1d5db 0%, #c7cad1 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .download-links {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .download-link {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .btn {
                min-width: 100%;
            }
        }
        }
        
        .download-link:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>UML Diagram Generated Successfully!</h1>
        
        <div class="meta">
            <p><strong>Source:</strong> {{ source }}</p>
            <p><strong>Generated:</strong> {{ timestamp }}</p>
        </div>
        
        <div class="diagram-section">
            <h2>📊 Generated Diagram (PNG)</h2>
            <div class="diagram-container">
                <img src="{{ png_url }}" alt="UML Diagram">
            </div>
            <div class="download-links">
                <a href="{{ png_url }}" class="download-link" download>⬇️ Download PNG</a>
                <a href="{{ svg_url }}" class="download-link" download>⬇️ Download SVG</a>
            </div>
        </div>
        
        <div class="code-section">
            <h2>📝 PlantUML Code</h2>
            <pre>{{ plantuml_code }}</pre>
        </div>
        
        <div class="buttons">
            <a href="/" class="btn btn-primary">🔄 Generate Another Diagram</a>
            <button onclick="window.print()" class="btn btn-secondary">🖨️ Print</button>
        </div>
    </div>
</body>
</html>
